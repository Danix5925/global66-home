<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global66 - Clon</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="main-header">
    <div class="header-container">

        <!-- LEFT: Logo + Segmentos -->
        <div class="header-left">
            <div class="logo">
                <img src="assets/global66-logo-png_seeklogo-650938.png" alt="Global66" class="logo-img">
            </div>
            <nav class="segment-nav">
                <a href="#" class="segment-link active">PERSONAS</a>
                <a href="#" class="segment-link">EMPRESAS</a>
            </nav>
        </div>

        <!-- RIGHT: Nav + Acciones -->
        <div class="header-right">
            <nav class="main-nav">
                <div class="nav-item has-dropdown">
                    <a href="#" class="nav-link">Productos</a>
                    <span class="nav-arrow">
                        <svg width="12" height="7" viewBox="0 0 12 7" fill="none">
                            <path d="M1 1L6 6L11 1" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </span>
                </div>
                <div class="nav-item has-dropdown">
                    <a href="#" class="nav-link">Beneficios</a>
                    <span class="nav-arrow">
                        <svg width="12" height="7" viewBox="0 0 12 7" fill="none">
                            <path d="M1 1L6 6L11 1" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </span>
                </div>
                <div class="nav-item">
                    <a href="#" class="nav-link">Ayuda</a>
                </div>
            </nav>

            <div class="header-actions">
                <!-- Selector de país -->
                <div class="country-selector">
                    <img src="assets/Flag_of_Colombia.svg.png" alt="Colombia" class="flag-icon">
                    <span class="country-arrow">
                        <svg width="12" height="7" viewBox="0 0 12 7" fill="none">
                            <path d="M1 1L6 6L11 1" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </span>
                </div>

                <div class="header-divider"></div>

                <!-- Botones de auth -->
                <a href="#" class="btn-login">Iniciar sesión</a>
                <a href="#" class="btn-signup">Crear cuenta</a>
            </div>
        </div>

    </div>
</header>

</body>
</html>
